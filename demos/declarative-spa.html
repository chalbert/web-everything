<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Declarative SPA Demo - Web Everything</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/demos/declarative-spa.css">
</head>
<body>
  <div class="demo-header">
    <div class="demo-header-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      Web Everything
    </div>
    <a href="/" class="demo-header-back">
      ← Back to Home
    </a>
  </div>

  <div class="app-container">
    <div class="app-main">
      <header>
        <h1>Declarative SPA Demo</h1>
        
        <nav>
          <button data-view="counter" data-active="true" on:click="navigate($event)">Counter</button>
          <button data-view="todos" data-active="false" on:click="navigate($event)">Todo List</button>
          <button data-view="form" data-active="false" on:click="navigate($event)">Form</button>
        </nav>
      </header>
      
      <main>
      <!-- Counter View -->
      <section class="view" data-view="counter" data-active="true">
        <div class="counter">
          <h2>Counter Demo</h2>
          <div class="counter-value" bind-text="count">0</div>
          <div class="counter-controls">
            <button on:click="decrement($event)">Decrement</button>
            <button class="secondary" on:click="reset($event)">Reset</button>
            <button on:click="increment($event)">Increment</button>
          </div>
        </div>
      </section>
      
      <!-- Todo List View -->
      <section class="view" data-view="todos" data-active="false">
        <div class="todo-section">
          <h2>Todo List</h2>
          
          <form class="todo-form" on:submit="addTodo($event)">
            <input 
              type="text" 
              placeholder="Add a new todo..." 
              bind-value="newTodoText"
              required
            />
            <button type="submit">Add</button>
          </form>
          
          <ul class="todo-list" data-list="todos">
            <!-- Todos will be rendered here dynamically -->
          </ul>
          
          <div class="todo-stats">
            <div class="stat">
              <div class="stat-value" bind-text="totalTodos">0</div>
              <div class="stat-label">Total</div>
            </div>
            <div class="stat">
              <div class="stat-value" bind-text="activeTodos">0</div>
              <div class="stat-label">Active</div>
            </div>
            <div class="stat">
              <div class="stat-value" bind-text="completedTodos">0</div>
              <div class="stat-label">Completed</div>
            </div>
          </div>
        </div>
      </section>
      
      <!-- Form View -->
      <section class="view" data-view="form" data-active="false">
        <div class="form-section">
          <h2>User Form</h2>
          
          <form>
            <div class="form-group">
              <label for="name">Name</label>
              <input 
                type="text" 
                id="name" 
                bind-value="formData.name"
                placeholder="Enter your name"
              />
            </div>
            
            <div class="form-group">
              <label for="email">Email</label>
              <input 
                type="email" 
                id="email" 
                bind-value="formData.email"
                placeholder="Enter your email"
              />
            </div>
            
            <div class="form-group">
              <label for="role">Role</label>
              <select id="role" bind-value="formData.role">
                <option value="">Select a role</option>
                <option value="developer">Developer</option>
                <option value="designer">Designer</option>
                <option value="manager">Manager</option>
                <option value="other">Other</option>
              </select>
            </div>
          </form>
          
          <div class="form-preview">
            <div class="preview-title">Form Preview</div>
            <div class="preview-item">
              <span class="preview-label">Name:</span>
              <span class="preview-value" bind-text="formData.name">-</span>
            </div>
            <div class="preview-item">
              <span class="preview-label">Email:</span>
              <span class="preview-value" bind-text="formData.email">-</span>
            </div>
            <div class="preview-item">
              <span class="preview-label">Role:</span>
              <span class="preview-value" bind-text="formData.role">-</span>
            </div>
          </div>
        </div>
      </section>
    </main>
    </div>

    <!-- Source Code Viewer -->
    <aside class="source-viewer">
      <div class="source-viewer-header">
        <div class="source-viewer-title">Source Code</div>
        <div class="source-viewer-toggle">
          <button id="view-source-btn" class="active">HTML</button>
          <button id="view-js-btn">JS</button>
          <button id="view-dom-btn">Live DOM</button>
        </div>
        <div class="source-viewer-mode">
          <span class="mode-link active">Plugged</span>
          <a href="declarative-spa-unplugged.html" class="mode-link">Unplugged</a>
        </div>
      </div>
      <div class="source-viewer-content">
        <pre id="source-display"></pre>
      </div>
    </aside>
  </div>
  
  <!-- Bootstrap: applies patches and exposes globals (not shown in code viewer) -->
  <script type="module" src="/plugs/bootstrap.ts"></script>

  <!-- Demo JS Source (for code viewer - stored as text/plain so Vite doesn't transform it) -->
  <script type="text/plain" id="demo-js-source">
// Import blocks and globals
import { createOnEventAttribute } from '/blocks/attributes/on-event/OnEventAttribute';
import { CallParser } from '/blocks/parsers/call/CallParser';
import { ValueParser } from '/blocks/parsers/value/ValueParser';
import { PipeParser } from '/blocks/parsers/pipe/PipeParser';
import { CustomExpressionParserRegistry } from '/plugs/webexpressions';
const { CustomAttribute, injectors } = window;

// === PARSER REGISTRY SETUP ===
// Register composable parsers via CustomExpressionParserRegistry
const parsers = new CustomExpressionParserRegistry();
parsers.define('call', new CallParser());
parsers.define('value', new ValueParser());
parsers.define('pipe', new PipeParser());

// Provide parsers via the injector system
const documentInjector = injectors.getInjectorOf(document);
documentInjector.set('customExpressionParsers', parsers);

// === STORES ===

// Counter Store
const counterStore = {
  _state: { count: 0 },
  _listeners: [],
  subscribe(cb) { this._listeners.push(cb); return () => this._listeners = this._listeners.filter(l => l !== cb); },
  getItem(key) { return this._state[key]; },
  setItem(key, value) { this._state[key] = value; this._listeners.forEach(cb => cb(this._state)); }
};

// Todo Store
const todoStore = {
  _state: { todos: [], newTodoText: '', totalTodos: 0, activeTodos: 0, completedTodos: 0 },
  _listeners: [],
  subscribe(cb) { this._listeners.push(cb); return () => this._listeners = this._listeners.filter(l => l !== cb); },
  getItem(key) { return this._state[key]; },
  setItem(key, value) {
    this._state[key] = value;
    const todos = this._state.todos || [];
    this._state.totalTodos = todos.length;
    this._state.activeTodos = todos.filter(t => !t.completed).length;
    this._state.completedTodos = todos.filter(t => t.completed).length;
    this._listeners.forEach(cb => cb(this._state));
  }
};

// Form Store
const formStore = {
  _state: { formData: { name: '', email: '', role: '' } },
  _listeners: [],
  subscribe(cb) { this._listeners.push(cb); return () => this._listeners = this._listeners.filter(l => l !== cb); },
  getItem(key) {
    if (key.includes('.')) { const [obj, prop] = key.split('.'); return this._state[obj]?.[prop]; }
    return this._state[key];
  },
  setItem(key, value) {
    if (key.includes('.')) { const [obj, prop] = key.split('.'); this._state[obj] = this._state[obj] || {}; this._state[obj][prop] = value; }
    else { this._state[key] = value; }
    this._listeners.forEach(cb => cb(this._state));
  }
};

// === EVENT HANDLERS (using blocks/on-event) ===

const handlers = {
  // Counter actions
  increment: (e) => {
    e.preventDefault();
    counterStore.setItem('count', counterStore.getItem('count') + 1);
  },
  decrement: (e) => {
    e.preventDefault();
    counterStore.setItem('count', counterStore.getItem('count') - 1);
  },
  reset: (e) => {
    e.preventDefault();
    counterStore.setItem('count', 0);
  },

  // Navigation - uses $event to get the clicked button
  navigate: (e) => {
    e.preventDefault();
    const viewName = e.target.getAttribute('data-view');
    if (viewName) {
      document.querySelectorAll('nav button').forEach(btn => btn.setAttribute('data-active', 'false'));
      e.target.setAttribute('data-active', 'true');
      document.querySelectorAll('.view').forEach(view => view.setAttribute('data-active', 'false'));
      document.querySelector(`.view[data-view="${viewName}"]`)?.setAttribute('data-active', 'true');
    }
  },

  // Todo actions
  addTodo: (e) => {
    e.preventDefault();
    const text = todoStore.getItem('newTodoText');
    if (text?.trim()) {
      const todos = todoStore.getItem('todos') || [];
      todoStore.setItem('todos', [...todos, { id: Date.now(), text: text.trim(), completed: false }]);
      todoStore.setItem('newTodoText', '');
      renderTodos();
    }
  },

  // Expression syntax passes the id directly: toggleTodo($event, 123)
  toggleTodo: (e, id) => {
    const todos = todoStore.getItem('todos');
    const updated = todos.map(t => t.id === id ? { ...t, completed: e.target.checked } : t);
    todoStore.setItem('todos', updated);
  },

  deleteTodo: (e, id) => {
    e.preventDefault();
    const todos = todoStore.getItem('todos');
    todoStore.setItem('todos', todos.filter(t => t.id !== id));
  }
};

// Provide handlers via the injector system (context-based approach)
documentInjector.set('customContexts:handlers', handlers);

// Create on:* attributes using the block factory
// All context (handlers, state) is resolved from the injector chain
const OnEventAttribute = createOnEventAttribute();

// Register event attributes
attributes.define('on:click', OnEventAttribute);
attributes.define('on:submit', OnEventAttribute);
attributes.define('on:change', OnEventAttribute);

// Register binding attributes (bind-text, bind-value)
// ... (simplified for display)

// Upgrade document
attributes.upgrade(document.body);
  </script>

  <!-- Demo Code -->
  <script type="module">
    // Import blocks
    import { createOnEventAttribute } from '/blocks/attributes/on-event/OnEventAttribute';
    import { CallParser } from '/blocks/parsers/call/CallParser';
    import { ValueParser } from '/blocks/parsers/value/ValueParser';
    import { PipeParser } from '/blocks/parsers/pipe/PipeParser';
    import { CustomExpressionParserRegistry } from '/plugs/webexpressions';

    // Destructure globals (plugged mode)
    const { CustomAttribute, injectors } = window;

    // === PARSER REGISTRY SETUP ===
    // Register composable parsers via CustomExpressionParserRegistry
    const parsers = new CustomExpressionParserRegistry();
    parsers.define('call', new CallParser());
    parsers.define('value', new ValueParser());
    parsers.define('pipe', new PipeParser());

    // Provide parsers via the injector system
    const documentInjector = injectors.getInjectorOf(document);
    documentInjector.set('customExpressionParsers', parsers);

    // === STORES ===

    // Simple store implementation
    function createStore(initialState) {
      const store = {
        _state: initialState,
        _listeners: [],
        subscribe(callback) {
          store._listeners.push(callback);
          return () => { store._listeners = store._listeners.filter(l => l !== callback); };
        },
        getItem(key) {
          if (key.includes('.')) {
            const [obj, prop] = key.split('.');
            return store._state[obj]?.[prop];
          }
          return store._state[key];
        },
        setItem(key, value) {
          if (key.includes('.')) {
            const [obj, prop] = key.split('.');
            store._state[obj] = store._state[obj] || {};
            store._state[obj][prop] = value;
          } else {
            store._state[key] = value;
          }
          store._listeners.forEach(cb => cb(store._state));
        }
      };
      return store;
    }

    // Create stores
    const counterStore = createStore({ count: 0 });

    const todoStore = createStore({
      todos: [],
      newTodoText: '',
      totalTodos: 0,
      activeTodos: 0,
      completedTodos: 0
    });
    // Override setItem to update stats BEFORE notifying listeners
    todoStore.setItem = (key, value) => {
      if (key.includes('.')) {
        const [obj, prop] = key.split('.');
        todoStore._state[obj] = todoStore._state[obj] || {};
        todoStore._state[obj][prop] = value;
      } else {
        todoStore._state[key] = value;
      }
      // Update stats before notifying
      const todos = todoStore._state.todos || [];
      todoStore._state.totalTodos = todos.length;
      todoStore._state.activeTodos = todos.filter(t => !t.completed).length;
      todoStore._state.completedTodos = todos.filter(t => t.completed).length;
      // Now notify listeners
      todoStore._listeners.forEach(cb => cb(todoStore._state));
    };

    const formStore = createStore({
      formData: { name: '', email: '', role: '' }
    });

    // Helper to get store by path
    function getStoreForPath(path) {
      if (path.startsWith('formData.')) return formStore;
      if (['newTodoText', 'totalTodos', 'activeTodos', 'completedTodos', 'todos'].includes(path)) return todoStore;
      return counterStore;
    }

    // === TODO RENDERING ===

    function renderTodos() {
      const list = document.querySelector('[data-list="todos"]');
      if (!list) return;

      const todos = todoStore.getItem('todos') || [];
      list.innerHTML = '';

      todos.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.setAttribute('data-completed', todo.completed);

        li.innerHTML = `
          <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}
                 on:change="toggleTodo($event, ${todo.id})">
          <span class="todo-text">${todo.text}</span>
          <button class="todo-delete" on:click="deleteTodo($event, ${todo.id})">Delete</button>
        `;

        list.appendChild(li);
      });

      // Upgrade newly added elements
      attributes.upgrade(list);
    }

    // Subscribe to todo changes
    todoStore.subscribe(renderTodos);

    // === EVENT HANDLERS (using blocks/on-event) ===

    const handlers = {
      // Counter actions
      increment: (e) => {
        e.preventDefault();
        counterStore.setItem('count', counterStore.getItem('count') + 1);
      },
      decrement: (e) => {
        e.preventDefault();
        counterStore.setItem('count', counterStore.getItem('count') - 1);
      },
      reset: (e) => {
        e.preventDefault();
        counterStore.setItem('count', 0);
      },

      // Navigation
      navigate: (e) => {
        e.preventDefault();
        const viewName = e.target.getAttribute('data-view');
        if (viewName) {
          document.querySelectorAll('nav button').forEach(btn => btn.setAttribute('data-active', 'false'));
          e.target.setAttribute('data-active', 'true');
          document.querySelectorAll('.view').forEach(view => view.setAttribute('data-active', 'false'));
          document.querySelector(`.view[data-view="${viewName}"]`)?.setAttribute('data-active', 'true');
        }
      },

      // Todo actions
      addTodo: (e) => {
        e.preventDefault();
        const text = todoStore.getItem('newTodoText');
        if (text?.trim()) {
          const todos = todoStore.getItem('todos') || [];
          todoStore.setItem('todos', [...todos, { id: Date.now(), text: text.trim(), completed: false }]);
          todoStore.setItem('newTodoText', '');
        }
      },

      toggleTodo: (e, id) => {
        const todos = todoStore.getItem('todos');
        const updated = todos.map(t => t.id === id ? { ...t, completed: e.target.checked } : t);
        todoStore.setItem('todos', updated);
      },

      deleteTodo: (e, id) => {
        e.preventDefault();
        const todos = todoStore.getItem('todos');
        todoStore.setItem('todos', todos.filter(t => t.id !== id));
      }
    };

    // Provide handlers via the injector system (context-based approach)
    documentInjector.set('customContexts:handlers', handlers);

    // Create on:* attribute using the block factory
    // All context (handlers, state) is resolved from the injector chain
    const OnEventAttribute = createOnEventAttribute();

    // === BINDING ATTRIBUTES ===

    // Bind-Text Attribute
    class BindTextAttribute extends CustomAttribute {
      connectedCallback() {
        const path = this.value;
        if (!path) return;

        const store = getStoreForPath(path);
        this._updateText = () => {
          if (this.target) this.target.textContent = store.getItem(path) ?? '';
        };
        this._updateText();
        this._unsubscribe = store.subscribe(this._updateText);
      }

      disconnectedCallback() {
        this._unsubscribe?.();
      }
    }

    // Bind-Value Attribute
    class BindValueAttribute extends CustomAttribute {
      connectedCallback() {
        const path = this.value;
        if (!path) return;

        const store = getStoreForPath(path);

        // Initial value
        const value = store.getItem(path);
        if (this.target && value !== undefined) this.target.value = value;

        // Handle input
        this._handleInput = (e) => store.setItem(path, e.target.value);
        this.target?.addEventListener('input', this._handleInput);

        // Sync from store
        this._unsubscribe = store.subscribe(() => {
          const newValue = store.getItem(path);
          if (this.target && this.target.value !== newValue) {
            this.target.value = newValue ?? '';
          }
        });
      }

      disconnectedCallback() {
        this.target?.removeEventListener('input', this._handleInput);
        this._unsubscribe?.();
      }
    }

    // === REGISTER ATTRIBUTES ===

    attributes.define('bind-text', BindTextAttribute);
    attributes.define('bind-value', BindValueAttribute);
    attributes.define('on:click', OnEventAttribute);
    attributes.define('on:submit', OnEventAttribute);
    attributes.define('on:change', OnEventAttribute);

    // Upgrade document
    attributes.upgrade(document.body);
    
    // Source code viewer functionality
    let currentView = 'html';
    const sourceDisplay = document.getElementById('source-display');
    const viewSourceBtn = document.getElementById('view-source-btn');
    const viewJsBtn = document.getElementById('view-js-btn');
    const viewDomBtn = document.getElementById('view-dom-btn');

    // Get JS source from the text/plain script tag (not transformed by Vite)
    const jsSourceElement = document.getElementById('demo-js-source');
    window.originalScript = jsSourceElement ? jsSourceElement.textContent.trim() : '';

    // Fetch original source and extract the app-main content
    fetch(window.location.href)
      .then(res => res.text())
      .then(sourceCode => {
        // Parse the HTML and extract just the .app-main content
        const parser = new DOMParser();
        const doc = parser.parseFromString(sourceCode, 'text/html');
        const appMain = doc.querySelector('.app-main');
        window.originalHtml = appMain ? appMain.outerHTML : sourceCode;

        displaySource();
      });

    function displaySource() {
      if (currentView === 'html') {
        sourceDisplay.textContent = window.originalHtml || 'Loading...';
      } else if (currentView === 'js') {
        sourceDisplay.textContent = window.originalScript || 'Loading...';
      } else {
        // Show live DOM of the app-main section
        const appMain = document.querySelector('.app-main');
        sourceDisplay.textContent = appMain ? appMain.outerHTML : document.body.innerHTML;
      }
    }

    function setActiveView(view, activeBtn) {
      currentView = view;
      viewSourceBtn.classList.remove('active');
      viewJsBtn.classList.remove('active');
      viewDomBtn.classList.remove('active');
      activeBtn.classList.add('active');
      displaySource();
    }

    viewSourceBtn.addEventListener('click', () => setActiveView('html', viewSourceBtn));
    viewJsBtn.addEventListener('click', () => setActiveView('js', viewJsBtn));
    viewDomBtn.addEventListener('click', () => setActiveView('dom', viewDomBtn));
    
    // Update live DOM view when changes occur (debounced)
    let updateTimeout;
    const observer = new MutationObserver(() => {
      if (currentView === 'dom') {
        clearTimeout(updateTimeout);
        updateTimeout = setTimeout(displaySource, 100);
      }
    });
    
    observer.observe(document.querySelector('.app-main') || document.body, {
      childList: true,
      subtree: true,
      attributes: true,
      characterData: true
    });
    
    // Signal ready
    window.demoReady = true;
    window.demoMode = 'plugged';
  </script>
</body>
</html>
