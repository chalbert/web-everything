<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View + Tabs Demo - Web Everything</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    /*
     * #1326 — the WE-local view/tabs runtime was deleted (#1245/#1246/#1282: WE holds zero delivery
     * runtime). This page is now a #701 fuiDemo iframe shell embedding the FUI-canonical demo, so the
     * page keeps working without a WE-resident copy. The demo is a FUI deliverable (fui:demos/view-tabs-demo.html).
     */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #0f1115; color: #e6e9ef; height: 100vh; display: flex; flex-direction: column; }
    .demo-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #232733; background: #151821; flex: none; }
    .demo-header-brand { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .demo-header-brand svg { width: 22px; height: 22px; }
    .demo-header-back { color: #9aa4b2; text-decoration: none; font-size: 14px; }
    .demo-header-back:hover { color: #e6e9ef; }
    .fui-note { padding: 8px 20px; font-size: 13px; color: #9aa4b2; background: #11141b; border-bottom: 1px solid #232733; flex: none; }
    .fui-note code { color: #c8cedb; }
    iframe { border: 0; width: 100%; flex: 1 1 auto; background: #fff; }
  </style>
</head>
<body>
  <div class="demo-header">
    <div class="demo-header-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"></polyline>
        <polyline points="8 6 2 12 8 18"></polyline>
      </svg>
      Web Everything
    </div>
    <a href="/" class="demo-header-back">&larr; Back to Home</a>
  </div>

  <p class="fui-note">
    View + Tabs renders from the <strong>Frontier&nbsp;UI canonical demo</strong> (the WE-resident runtime
    copy was removed per <code>#1245</code>/<code>#1246</code> — WE holds zero delivery runtime). Embedded
    via the <code>#701</code> fuiDemo iframe from <code>fui:demos/view-tabs-demo.html</code>.
  </p>

  <iframe
    src="http://localhost:3001/demos/view-tabs-demo.html"
    title="View + Tabs — Frontier UI canonical demo"
    loading="lazy"
    sandbox="allow-scripts allow-same-origin"></iframe>
</body>
</html>
