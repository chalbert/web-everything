<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Grid Bootstrap Fixture - Web Everything</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <!--
    A deliberately minimal, bootstrapped page that proves `grid:cell-navigation` AUTO-UPGRADES.

    Unlike the conformance playground (demos/data-grid-demo.ts), nothing here constructs the behavior
    by hand (`new DataGridBehavior(); attach(); connectedCallback()`). The grid below is plain authored
    markup — the documented HTML-usage shape (native <table role="grid">, role="row"/"columnheader"/
    "gridcell" cells, data-row/data-col, aria indices) — and the ONLY wiring is the bootstrap's registry
    upgrade. If `registerDataGrid(window.attributes)` in plugs/bootstrap.ts ever stops firing, this page's
    grid never becomes keyboard-navigable and the e2e fails. That is the gap #144 closes.

    Authored intentionally with NO `tabindex="0"` cell: every cell starts at `tabindex="-1"`. The roving
    tabindex="0" that appears after load is produced by the behavior's connectedCallback (#seedActive),
    so its presence is itself proof the registration line fired — there is no other source for it here.
  -->
  <main>
    <h1>Data Grid — bootstrap auto-upgrade fixture</h1>

    <table role="grid" grid:cell-navigation aria-rowcount="3" aria-colcount="2" data-test="grid">
      <thead>
        <tr role="row" aria-rowindex="1">
          <th role="columnheader" tabindex="-1" aria-colindex="1" data-row="0" data-col="0">Name</th>
          <th role="columnheader" tabindex="-1" aria-colindex="2" data-row="0" data-col="1">Team</th>
        </tr>
      </thead>
      <tbody>
        <tr role="row" aria-rowindex="2">
          <td role="gridcell" tabindex="-1" aria-colindex="1" data-row="1" data-col="0">Aaron</td>
          <td role="gridcell" tabindex="-1" aria-colindex="2" data-row="1" data-col="1">Engineering</td>
        </tr>
        <tr role="row" aria-rowindex="3">
          <td role="gridcell" tabindex="-1" aria-colindex="1" data-row="2" data-col="0">Bianca</td>
          <td role="gridcell" tabindex="-1" aria-colindex="2" data-row="2" data-col="1">Design</td>
        </tr>
      </tbody>
    </table>
  </main>

  <!-- Bootstrap: applies patches, exposes globals, and runs registerDataGrid(window.attributes). -->
  <script type="module" src="/plugs/bootstrap.ts"></script>

  <script type="module">
    // The whole point: the page never touches DataGridBehavior directly. It only asks the registry to
    // upgrade the tree — exactly what a real app's bootstrap does — and the registered behavior attaches
    // itself. (The MutationObserver upgrade() installs would also catch a grid added later.)
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    function init() {
      window.attributes.upgrade(document.body);
      window.fixtureReady = true;
    }
  </script>
</body>
</html>
