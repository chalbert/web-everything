<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WE Spec Explorer</title>
  <link rel="stylesheet" href="dev-panel.css">
</head>
<body>

  <div class="dev-panel">
    <header class="panel-header">
      <h1>Spec Explorer</h1>
      <div class="panel-header-actions">
        <button id="new-chat-btn" class="new-chat-btn" title="New conversation">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New
        </button>
        <span class="status" id="status">Checking…</span>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="message system">
        Ask about Web Everything specs, blocks, plugs, or design decisions.
      </div>
    </div>

    <form class="input-area" id="input-form">
      <textarea
        id="prompt-input"
        placeholder="Message Spec Explorer…"
        rows="1"
      ></textarea>
      <button type="submit" id="send-btn">
        <svg id="send-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        <svg id="stop-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none">
          <rect x="4" y="4" width="16" height="16" rx="2"></rect>
        </svg>
      </button>
    </form>
  </div>

  <script type="module">
    // ── Iframe detection ─────────────────────────────────
    if (window.self !== window.top) {
      document.querySelector('.dev-panel').classList.add('in-iframe');
    }

    // ── Imports ───────────────────────────────────────────
    import { marked } from 'https://esm.sh/marked@15';

    // ── DOM refs ─────────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const inputForm  = document.getElementById('input-form');
    const promptInput = document.getElementById('prompt-input');
    const sendBtn    = document.getElementById('send-btn');
    const sendIcon   = document.getElementById('send-icon');
    const stopIcon   = document.getElementById('stop-icon');
    const statusEl   = document.getElementById('status');

    let isStreaming = false;
    let abortController = null;
    let sessionId = sessionStorage.getItem('dev-panel-session') || null;
    let selectionContext = null;  // { text, page, title, heading }

    // ── Chat history persistence ─────────────────────────
    const HISTORY_KEY = 'dev-panel-history';

    function loadHistory() {
      try {
        return JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
      } catch { return []; }
    }

    function saveHistory(history) {
      sessionStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function appendToHistory(role, content) {
      const history = loadHistory();
      history.push({ role, content });
      saveHistory(history);
    }

    function clearHistory() {
      sessionStorage.removeItem(HISTORY_KEY);
      sessionStorage.removeItem('dev-panel-session');
      sessionId = null;
      // Reset messages to just the system prompt
      messagesEl.innerHTML = '';
      const sys = document.createElement('div');
      sys.className = 'message system';
      sys.textContent = 'Ask about Web Everything specs, blocks, plugs, or design decisions.';
      messagesEl.appendChild(sys);
    }

    // Restore previous messages on load
    function restoreHistory() {
      const history = loadHistory();
      if (history.length === 0) return;
      // Remove the default system message since we'll show real history
      messagesEl.innerHTML = '';
      for (const entry of history) {
        addMessage(entry.role, entry.content, true);
      }
    }

    // ── Health check ─────────────────────────────────────
    async function checkHealth() {
      try {
        const res  = await fetch('/__dev-panel/health');
        const data = await res.json();
        statusEl.textContent = data.available ? 'Ready' : 'Claude not found';
        statusEl.className   = 'status ' + (data.available ? 'ready' : 'error');
      } catch {
        statusEl.textContent = 'Bridge unavailable';
        statusEl.className   = 'status error';
      }
    }
    checkHealth();

    // ── Markdown rendering ───────────────────────────────
    function renderMarkdown(text) {
      return marked.parse(text, { breaks: true });
    }

    // ── Message helpers ──────────────────────────────────
    function addMessage(role, content, skipSave = false) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'user') {
        div.textContent = content;
      } else {
        div.innerHTML = renderMarkdown(content);
        addCopyButtons(div);
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      if (!skipSave) appendToHistory(role, content);
      return div;
    }

    function createStreamingMessage() {
      const div = document.createElement('div');
      div.className = 'message assistant streaming';
      div.innerHTML = '<span class="cursor"></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    let pendingRender = null;
    function updateStreamingMessage(div, fullText) {
      if (pendingRender) cancelAnimationFrame(pendingRender);
      pendingRender = requestAnimationFrame(() => {
        div.innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function finalizeMessage(div, fullText) {
      if (pendingRender) cancelAnimationFrame(pendingRender);
      div.innerHTML = renderMarkdown(fullText);
      div.classList.remove('streaming');
      messagesEl.scrollTop = messagesEl.scrollHeight;
      // Persist assistant response
      appendToHistory('assistant', fullText);
    }

    function addToolActivity(name) {
      const el = document.createElement('div');
      el.className = 'tool-activity';
      el.textContent = name;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── Stream-JSON message parsing ──────────────────────
    //
    // The claude CLI with `--output-format stream-json`
    // outputs NDJSON. We handle several known message shapes:
    //
    //   content_block_delta  → streaming text chunk
    //   assistant            → complete assistant message
    //   result               → final result text
    //   tool_use / tool_result → tool activity
    //
    function extractText(msg) {
      // Streaming text delta
      if (msg.type === 'content_block_delta' && msg.delta?.type === 'text_delta') {
        return msg.delta.text;
      }
      // Full assistant message (content array)
      if (msg.type === 'assistant' && msg.message?.content) {
        return msg.message.content
          .filter(c => c.type === 'text')
          .map(c => c.text)
          .join('');
      }
      // Result with inline text
      if (msg.type === 'result' && typeof msg.result === 'string') {
        return msg.result;
      }
      return null;
    }

    function extractToolName(msg) {
      if (msg.type === 'content_block_start' && msg.content_block?.type === 'tool_use') {
        return msg.content_block.name;
      }
      return null;
    }

    // ── UI state helpers ─────────────────────────────────
    function setStreaming(active) {
      isStreaming = active;
      promptInput.disabled = active;
      promptInput.classList.toggle('disabled', active);
      sendIcon.style.display = active ? 'none' : '';
      stopIcon.style.display = active ? '' : 'none';
      sendBtn.classList.toggle('stop', active);
    }

    // ── Auto-resize textarea ──────────────────────────────
    function autoResize() {
      promptInput.style.height = 'auto';
      const maxHeight = 6 * 24;  // ~6 lines
      promptInput.style.height = Math.min(promptInput.scrollHeight, maxHeight) + 'px';
    }
    promptInput.addEventListener('input', autoResize);

    // ── Copy buttons on code blocks ───────────────────────
    function addCopyButtons(container) {
      container.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.addEventListener('click', async () => {
          const code = pre.querySelector('code')?.textContent ?? pre.textContent;
          await navigator.clipboard.writeText(code);
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
        });
        pre.style.position = 'relative';
        pre.appendChild(btn);
      });
    }

    // ── Query streaming ──────────────────────────────────
    async function streamQuery(prompt, displayText) {
      abortController = new AbortController();
      setStreaming(true);

      addMessage('user', displayText || prompt);
      const streamDiv = createStreamingMessage();
      let fullText = '';

      try {
        const response = await fetch('/__dev-panel/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, sessionId }),
          signal: abortController.signal,
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: response.statusText }));
          throw new Error(err.error || 'Request failed');
        }

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() ?? '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();

            try {
              const msg = JSON.parse(data);

              // Capture session ID for conversation continuity
              if (msg.session_id) {
                sessionId = msg.session_id;
                sessionStorage.setItem('dev-panel-session', sessionId);
              }

              // Terminal signals
              if (msg.type === 'done' || msg.type === 'error') {
                if (msg.type === 'error') {
                  fullText += `\n\n**Error:** ${msg.message}`;
                }
                continue;
              }

              // Result message — use as final text if we have nothing yet
              if (msg.type === 'result') {
                if (msg.session_id) {
                  sessionId = msg.session_id;
                  sessionStorage.setItem('dev-panel-session', sessionId);
                }
                if (typeof msg.result === 'string' && !fullText) {
                  fullText = msg.result;
                  updateStreamingMessage(streamDiv, fullText);
                }
                continue;
              }

              // Tool activity indicator
              const toolName = extractToolName(msg);
              if (toolName) {
                addToolActivity(toolName);
                continue;
              }

              // Streaming text
              const text = extractText(msg);
              if (text) {
                fullText += text;
                updateStreamingMessage(streamDiv, fullText);
              }
            } catch {
              // Non-JSON line — skip
            }
          }
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          fullText = fullText || '*Response stopped.*';
        } else {
          fullText = fullText || `**Connection error:** ${err.message}`;
        }
      }

      finalizeMessage(streamDiv, fullText || '*No response received.*');
      addCopyButtons(streamDiv);
      abortController = null;
      setStreaming(false);
      promptInput.focus();
    }

    // ── Selection context ────────────────────────────────
    const contextContainer = document.createElement('div');
    contextContainer.id = 'selection-context';
    contextContainer.style.display = 'none';
    // Insert before the input area
    inputForm.parentNode.insertBefore(contextContainer, inputForm);

    function showSelectionContext(ctx) {
      selectionContext = ctx;
      const source = ctx.heading
        ? `${ctx.title} > ${ctx.heading}`
        : ctx.title;
      const truncated = ctx.text.length > 200
        ? ctx.text.slice(0, 200) + '…'
        : ctx.text;
      contextContainer.innerHTML =
        '<div class="selection-context">' +
          '<div class="selection-context-text">' +
            '<span class="selection-context-source">' + escapeHtml(source) + '</span>' +
            escapeHtml(truncated) +
          '</div>' +
          '<button class="selection-context-dismiss" title="Dismiss">&times;</button>' +
        '</div>';
      contextContainer.style.display = '';
      contextContainer.querySelector('.selection-context-dismiss')
        .addEventListener('click', clearSelectionContext);
      promptInput.focus();
    }

    function clearSelectionContext() {
      selectionContext = null;
      contextContainer.style.display = 'none';
      contextContainer.innerHTML = '';
    }

    function escapeHtml(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    function buildPromptWithContext(userPrompt) {
      if (!selectionContext) return userPrompt;
      const ctx = selectionContext;
      let prefix = `[Context: The user selected text from the page "${ctx.title}" (${ctx.page})`;
      if (ctx.heading) prefix += `, section "${ctx.heading}"`;
      if (ctx.sourceFile) prefix += `, source file: ${ctx.sourceFile}`;
      prefix += `]\n\nSelected text:\n"""\n${ctx.text}\n"""\n\n`;
      if (ctx.sourceContent) {
        prefix += `Full source file content:\n"""\n${ctx.sourceContent}\n"""\n\n`;
      }
      prefix += `User question: `;
      return prefix + userPrompt;
    }

    // Listen for selection context from parent window.
    // After receiving, fetch the enriched version from the server
    // which includes the resolved source file content.
    window.addEventListener('message', async (e) => {
      if (e.data && e.data.type === 'selection-context') {
        const ctx = e.data.context;
        // Fetch enriched selection (with sourceContent) from server
        try {
          const res = await fetch('/__dev-panel/selection');
          if (res.ok) {
            const enriched = await res.json();
            if (enriched.text && enriched.sourceContent) {
              showSelectionContext(enriched);
              return;
            }
          }
        } catch {}
        // Fallback to the raw context from postMessage
        showSelectionContext(ctx);
      }
    });

    // Signal to parent that we're ready
    if (window.self !== window.top) {
      window.parent.postMessage({ type: 'dev-panel-ready' }, '*');
    }

    // ── Event handlers ───────────────────────────────────
    inputForm.addEventListener('submit', (e) => {
      e.preventDefault();
      // If streaming, treat submit as stop
      if (isStreaming) {
        abortController?.abort();
        return;
      }
      const userText = promptInput.value.trim();
      if (!userText) return;
      promptInput.value = '';
      autoResize();
      const fullPrompt = buildPromptWithContext(userText);
      clearSelectionContext();
      streamQuery(fullPrompt, userText);
    });

    // Enter to send, Shift+Enter for newline
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        inputForm.dispatchEvent(new Event('submit'));
      }
    });

    // ── New chat button ─────────────────────────────────
    document.getElementById('new-chat-btn').addEventListener('click', () => {
      if (isStreaming) return;
      clearHistory();
    });

    // ── Restore history on load ──────────────────────────
    restoreHistory();

    promptInput.focus();
  </script>
</body>
</html>
