# Cloudflare Workers (Static Assets) config for the public WE site (#1137).
#
# Per the #1135 ratification the substrate is Cloudflare; the phase-1 shared-code gate is an edge function.
# Cloudflare retired the standalone Pages "Connect to Git" flow for new sites and steers them to Workers
# Static Assets (2026-07-02) — the go-forward unified platform. So the gate is now a Worker (`worker.js`)
# that fronts the Eleventy `_site/` build served through the ASSETS binding, instead of a Pages Function.
# Same behaviour, same later-phase story (KV for phase-3 per-person codes, etc.).
#
# Deploy is git-integration (Workers Builds): build `npm run build:docs` → `_site`, deploy `npx wrangler deploy`.

name = "web-everything"
main = "worker.js"
compatibility_date = "2026-06-19"

# The gated *.workers.dev preview URL (interim, until the custom domain is pointed).
# MUST be a TOP-LEVEL key (not under [assets]) or TOML folds it into the assets table and it's ignored.
workers_dev = true

# Secrets are NOT stored here — set them on the Worker (dashboard or `wrangler secret put`):
#   GATE_CODE            — the shared phase-1 entry code the splash form checks.
#   GATE_COOKIE_SECRET   — HMAC key signing the "remember me" cookie.
#
# Phase-3 (per-person codes) adds a [[kv_namespaces]] binding here; phase-5 (login) adds Cloudflare Access.

[assets]
directory = "./_site"
binding = "ASSETS"
# run_worker_first: the gate Worker MUST intercept every request (asset paths included) or content leaks.
# Array form ["/*"] = route ALL paths to the Worker first (the boolean `true` did not intercept in 4.106).
run_worker_first = ["/*"]
