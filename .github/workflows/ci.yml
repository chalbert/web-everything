name: CI

# Runs the unit suite + repo health gate on every push to main and on every pull_request against main
# (#2080, #2151). Closes the no-CI gap: the 2000+ vitest tests and check:standards previously ran only
# when an agent remembered to run them locally — origin now verifies every push (push-if-green publishes
# main, this re-checks it on GitHub). The pull_request trigger makes the same gate a PR status check so
# main can require it before merge (the #2138 merge-queue / self-approved-PR direction); it does not
# block today's direct-push landing.
#
# Scope: the fast deterministic lanes + the visual-regression guard (#2177).
# Unit suite (~10s) + gate (~3s) + the deterministic Playwright interaction lane (#2070 — self-contained
# against a static fixture server, no app build) + visual regression against committed linux baselines.
# The live-server a11y/content/smoke lanes still need a build-then-serve step — those CI-home under #800.
#
# Visual lane (job: visual): builds the docs site (requires FUI sibling, same as deploy.yml), serves the
# built _site statically on :8080, and runs `check:visual` against committed -chromium-linux baselines.
# Linux baselines live alongside the darwin ones in tests/visual/rendered-site-visual.spec.ts-snapshots/.
# Refresh them by running the `update-visual-baselines` workflow (.github/workflows/update-visual-baselines.yml).
# The `visual` job renders inside a version-locked `mcr.microsoft.com/playwright:vX.Y.Z-jammy` container
# pinned to the `@playwright/test` version installed in package-lock.json (#2234) — rendering on a bare
# `ubuntu-latest` runner lets the font/AA stack drift with the image, which is exactly what the -linux
# baselines are supposed to make reproducible. `npm run check:standards` fails loud if the image tag and
# the installed Playwright version ever drift apart (scripts/check-standards-rules.mjs, PLAYWRIGHT_CONTAINER
# _PIN_REQUIRED_FILES). Bump procedure: bump `@playwright/test` in package.json → `npm install` → copy the
# new resolved version from package-lock.json into the `container: image:` tag here AND in
# update-visual-baselines.yml (`vX.Y.Z-jammy`) → `npm run check:standards` to confirm lockstep.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Sibling layout under $GITHUB_WORKSPACE so WE's `../frontierui` resolves — both the vitest/vite
      # `@frontierui/*` alias (dev/test-time; `we:vitest.config.ts` → `../frontierui/plugs`) AND the pinned
      # component-render CLI the gate/build call. #2165 (single-repo CI has neither the sibling nor a
      # published `@frontierui/*` package), mirroring the #1137 deploy.yml workaround:
      #   $GITHUB_WORKSPACE/web-everything  (this repo)
      #   $GITHUB_WORKSPACE/frontierui      (the sibling)
      - name: Checkout WE
        uses: actions/checkout@v4
        with:
          path: web-everything
      - name: Checkout FUI (sibling)
        uses: actions/checkout@v4
        with:
          repository: chalbert/frontierui
          token: ${{ secrets.FUI_READ_TOKEN }}
          path: frontierui

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web-everything/package-lock.json
            frontierui/package-lock.json

      # FUI first (ratified #1946/#2016 ordering): install its deps (the `@frontierui/*` alias resolves to
      # sibling source that imports them) + build the pinned component-render CLI the gate/build call.
      - name: Install + build FUI tools
        working-directory: frontierui
        run: |
          npm ci
          npm run build:tools

      - name: Install
        working-directory: web-everything
        run: npm ci

      # Deploy smoke (#2220): `build:docs` is the exact artifact the Cloudflare deploy publishes, but it
      # otherwise only runs in the unrequired `visual` job and post-merge `deploy.yml`. Branch protection
      # gates on `test` alone, so before this step a broken docs build (e.g. the #2184 transforms.cjs
      # mis-wire) merged green and silently broke the deploy. FUI's pinned component-render CLI is already
      # built above, so this needs no extra setup; ~15s. Keep it fast (build only, no serve/visual — that
      # stays in the `visual` job) so the required check stays cheap.
      - name: Build WE docs (deploy smoke)
        working-directory: web-everything
        run: npm run build:docs

      - name: Unit suite + coverage (80% bar, #2082)
        working-directory: web-everything
        run: npm run test:coverage

      - name: Repo health gate
        working-directory: web-everything
        run: npm run check:standards

      # Deterministic Playwright interaction lane (#2070): drives the client-side backlog-table behaviour
      # over a fixed fixture page served by tests/interaction/serve.mjs. WE_INTERACTION_ONLY skips the app
      # dev-server webServer entry (see playwright.config.ts) so no build/live-data is needed.
      - name: Install Playwright chromium
        working-directory: web-everything
        run: npx playwright install --with-deps chromium

      - name: Interaction lane
        working-directory: web-everything
        run: npm run test:interaction
        env:
          WE_INTERACTION_ONLY: "1"

  # Visual-regression guard (#2177 / #1966). Builds the docs site (same sibling layout as deploy.yml)
  # and runs `check:visual` against committed -chromium-linux baselines. Separate job so its ~2–3 min
  # build cost doesn't slow the fast `test` job. Runs on the same events (push/PR/dispatch).
  #
  # Baseline hygiene: committed PNGs under tests/visual/rendered-site-visual.spec.ts-snapshots/
  # are platform-tagged. The darwin originals (local dev) stay alongside the linux ones (CI). Refresh
  # linux baselines via `workflow_dispatch` on `.github/workflows/update-visual-baselines.yml` after
  # an intentional look change (same discipline as `npm run check:visual:update` locally).
  visual:
    # DISABLED (#2232) pending the visual-regression rebuild epic. The gate has no committed
    # -chromium-linux baselines to compare against (they could never be seeded — the refresh workflow
    # hit the same :3000 timeout, and the #2179 verdict gate blocks a first-time seed), so it is
    # permanently red. A permanently-red *unrequired* job is pure noise that trains everyone to ignore CI
    # (it masked the #2184 breakage for ~6h). Turned off until the rebuild lands; the final slice #2240
    # re-enables it (and promotes it to a required, watched check). Do NOT flip this back on ad hoc —
    # re-enabling is gated on #2240's readiness (container-pinned baselines + PR-based refresh).
    if: ${{ false }}
    runs-on: ubuntu-latest
    # Version-locked Playwright container (#2234): pinned to the exact `@playwright/test` version in
    # package-lock.json so browsers + OS font/AA stack are byte-identical every run, on any host. The
    # image ships chromium pre-installed at this same version, so no separate browser-install step is
    # needed below (see the removed "Install Playwright chromium" step). Bump this tag in lockstep with
    # any `@playwright/test` upgrade — `npm run check:standards` fails loud on drift.
    container:
      image: mcr.microsoft.com/playwright:v1.58.1-jammy
    steps:
      # Same sibling layout as deploy.yml — WE's build shells out to FUI's component-render CLI.
      #   $GITHUB_WORKSPACE/web-everything  (this repo)
      #   $GITHUB_WORKSPACE/frontierui      (the tool sibling)
      - name: Checkout WE
        uses: actions/checkout@v4
        with:
          path: web-everything
      - name: Checkout FUI (sibling)
        uses: actions/checkout@v4
        with:
          repository: chalbert/frontierui
          token: ${{ secrets.FUI_READ_TOKEN }}
          path: frontierui

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web-everything/package-lock.json
            frontierui/package-lock.json

      # FUI tools first (ratified #1946/#2016 ordering) — produces the component-render CLI.
      - name: Install + build FUI tools
        working-directory: frontierui
        run: |
          npm ci
          npm run build:tools

      - name: Install WE
        working-directory: web-everything
        run: npm ci

      # Build the docs site so the visual spec has real rendered pages to screenshot.
      - name: Build WE docs
        working-directory: web-everything
        run: npm run build:docs

      # No "Install Playwright chromium" step here: the pinned container image already ships chromium
      # pre-built at the exact `@playwright/test` version above, so a separate `playwright install` would
      # be redundant (and could silently pull a *different* browser build if the pin ever drifted).

      # Serve the pre-built _site statically on :8080 (the visual spec's default port).
      # `npx serve` ships with Node and needs no extra install; `--single` avoids 404 on clean-URL routes.
      - name: Serve built site
        working-directory: web-everything
        run: npx serve _site --listen 8080 --single &
        shell: bash

      # Wait for the static server to be ready before running the visual tests.
      - name: Wait for site
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ && break
            sleep 1
          done

      # Visual regression — compares screenshots against the committed -chromium-linux baselines.
      # Fails if a baseline is missing (run update-visual-baselines.yml to generate linux baselines).
      # Upload the Playwright HTML report as an artifact on failure so regressions are inspectable.
      - name: Visual regression
        working-directory: web-everything
        run: npm run check:visual
        env:
          WE_ELEVENTY_PORT: "8080"
          # The site is pre-built and served statically on :8080 by the step above, so skip Playwright's
          # :3000 dev-server boot (playwright.config.ts webServer[0]) — it's unused by the visual specs and
          # times out in CI, failing the job. #2221.
          WE_PREBUILT_SITE: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: web-everything/playwright-report/
          retention-days: 7
