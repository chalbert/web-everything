name: CI

# Runs the unit suite + repo health gate on every push to main (#2080). Closes the no-CI gap: the
# 2000+ vitest tests and check:standards previously ran only when an agent remembered to run them
# locally — origin now verifies every push (push-if-green publishes main, this re-checks it on GitHub).
#
# Scope: the fast deterministic lanes only. Unit suite (~10s) + gate (~3s) + the deterministic
# Playwright interaction lane (#2070 — self-contained against a static fixture server, no app build).
# The live-server Playwright lanes (a11y/content/smoke/visual) still need a build-then-serve step and
# platform-tagged baselines — those CI-home under #800, not here.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Unit suite
        run: npm run test:unit

      - name: Repo health gate
        run: npm run check:standards

      # Deterministic Playwright interaction lane (#2070): drives the client-side backlog-table behaviour
      # over a fixed fixture page served by tests/interaction/serve.mjs. WE_INTERACTION_ONLY skips the app
      # dev-server webServer entry (see playwright.config.ts) so no build/live-data is needed.
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Interaction lane
        run: npm run test:interaction
        env:
          WE_INTERACTION_ONLY: "1"
