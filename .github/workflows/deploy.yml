# Auto-deploy the gated WE site to its Cloudflare Worker on every push to main (#1137).
# Reliable alternative to Cloudflare Workers Builds (whose git wizard hung on 2026-07-02).
# One-time setup: add repo secrets CLOUDFLARE_API_TOKEN (scoped: Workers Scripts · Edit) and
# CLOUDFLARE_ACCOUNT_ID under Settings → Secrets and variables → Actions.
name: Deploy WE site (Cloudflare Worker)

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: deploy-worker
  cancel-in-progress: true # a newer push supersedes an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # pins Node 22 to match local + wrangler
          cache: npm
      - run: npm ci
      - run: npm run build:docs # Eleventy → _site (self-contained; not build:demo, which needs the FUI sibling repo)
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy # runs `wrangler deploy` → uploads worker.js + the _site assets
