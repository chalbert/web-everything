name: Update visual baselines (linux)

# Regenerates the -chromium-linux Playwright snapshot baselines for the visual-regression guard
# (#2177 / #1966) and opens a PULL REQUEST carrying the refreshed PNGs — the PR's rendered image diff
# IS the review surface (#2238). This retires the #2179 verdict/mtime sidecar gate
# (scripts/check-visual-baseline-update.mjs, removed): that gate required an approved verdict JSON
# written AFTER the snapshot PNG, but a bot workflow can never author a verdict postdating its own
# regenerated PNG — so the two were in permanent deadlock and linux baselines could never be seeded.
#
# Usage:
#   GitHub UI → Actions → "Update visual baselines (linux)" → Run workflow → choose base branch.
#   The workflow pushes a `visual-baselines/refresh-<run id>` branch and opens a PR against that base
#   branch. It NEVER commits straight to the base branch. No diff → no PR (no-op).
#
# REVIEW BAR (#2238) — before approving/merging a baseline-refresh PR, the reviewer (human or AI) must
# open the PR's "Files changed" tab and, for EVERY changed PNG, confirm the pixel diff matches an
# intentional, already-landed look change (cite the PR/commit that caused it) — not an accidental
# regression, a flaky render, or drift from an unrelated dependency bump. A baseline PR with no known
# corresponding look change gets rejected/closed, never approved on faith. This PR review (backed by
# branch protection requiring an approval before merge) IS the recorded judgment — no separate sidecar
# artifact is needed.
#
# This is the CI-linux equivalent of `npm run check:visual:update` (local darwin refresh) — the local
# flow is unchanged: eyeball the diff, then land the updated PNGs through a normal reviewed PR same as
# any other code change (#2183).
#
# Runs inside the same version-locked `mcr.microsoft.com/playwright:vX.Y.Z-jammy` container as the
# ci.yml `visual` job (#2234) — the refresh MUST render on the exact same pinned image the check compares
# against, or a baseline regenerated here could still fail `check:visual` in CI. Bump procedure: bump
# `@playwright/test` in package.json → `npm install` → copy the new resolved version into the
# `container: image:` tag here AND in ci.yml (`vX.Y.Z-jammy`) → `npm run check:standards` confirms lockstep.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Base branch to refresh baselines against (defaults to main)"
        required: false
        default: "main"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    # Version-locked Playwright container (#2234) — same pin as the ci.yml `visual` job so refreshed
    # baselines are generated on the exact image `check:visual` will later compare against.
    container:
      image: mcr.microsoft.com/playwright:v1.58.1-jammy
    steps:
      # Check out the base branch so the diff (and the PR) is against it.
      - name: Checkout WE
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          path: web-everything
          # Need write permission for the branch push in the "Open baseline-refresh PR" step.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout FUI (sibling)
        uses: actions/checkout@v4
        with:
          repository: chalbert/frontierui
          token: ${{ secrets.FUI_READ_TOKEN }}
          path: frontierui

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web-everything/package-lock.json
            frontierui/package-lock.json

      # FUI tools first (ratified #1946/#2016 ordering).
      - name: Install + build FUI tools
        working-directory: frontierui
        run: |
          npm ci
          npm run build:tools

      - name: Install WE
        working-directory: web-everything
        run: npm ci

      - name: Build WE docs
        working-directory: web-everything
        run: npm run build:docs

      # No "Install Playwright chromium" step here: the pinned container image already ships chromium
      # pre-built at the exact `@playwright/test` version (see the `container:` pin above).

      - name: Serve built site
        working-directory: web-everything
        run: npx serve _site --listen 8080 --single &
        shell: bash

      - name: Wait for site
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ && break
            sleep 1
          done

      # --update-snapshots regenerates (or creates for the first time) the -chromium-linux PNGs.
      - name: Regenerate linux baselines
        working-directory: web-everything
        run: npm run check:visual:update
        env:
          WE_ELEVENTY_PORT: "8080"
          # Site is pre-built + served on :8080 above, so skip Playwright's :3000 dev-server boot — it's
          # unused and times out in CI (same fix as the ci.yml visual job, #2221). Without this the
          # baseline refresh hangs on webServer, which is why the -linux baselines were never seeded.
          WE_PREBUILT_SITE: "1"

      # Push the refreshed baselines to a dedicated branch and open (or update, on re-dispatch) a PR
      # against the base branch — the PR's rendered image diff is the review surface (#2238). Scoped to
      # the snapshots dir via add-paths so an incidental _site/ build artifact never rides along. A clean
      # working tree (no baseline change) is a no-op: no branch, no PR.
      #
      # KNOWN GAP: this step authors the branch push + PR with the default `secrets.GITHUB_TOKEN`. Per
      # GitHub's own recursion guard (same behavior release-please.yml documents for its Release PR), a
      # push/PR made with the default GITHUB_TOKEN does NOT trigger `pull_request`-triggered workflows —
      # so ci.yml's `test` job (main's sole required status check, branch-protection `strict` mode) will
      # never report on this PR, and it can sit permanently unmergeable through the normal route. Until a
      # repo PAT/App-token secret is provisioned for this step (a credential action, out of an agent's
      # reach — file/track separately), land it via `gh workflow run ci.yml --ref <branch>` to backfill
      # the check, or an admin merge override.
      - name: Open baseline-refresh PR
        uses: peter-evans/create-pull-request@v7
        with:
          path: web-everything
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.event.inputs.branch || 'main' }}
          branch: visual-baselines/refresh-${{ github.run_id }}
          add-paths: tests/visual/rendered-site-visual.spec.ts-snapshots/
          commit-message: "chore(visual): refresh linux baselines [update-visual-baselines workflow]"
          title: "chore(visual): refresh linux baselines"
          body: |
            Regenerated `-chromium-linux` Playwright snapshot baselines via the
            "Update visual baselines (linux)" workflow (run [`${{ github.run_id }}`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})), against base branch `${{ github.event.inputs.branch || 'main' }}`.

            **Review bar (#2238):** open "Files changed" and, for every changed PNG, confirm the pixel
            diff matches an intentional, already-landed look change (cite the PR/commit) before
            approving. No unreviewed baseline merges — this PR's review IS the visual-baseline gate
            (retires the #2179 verdict/mtime sidecar gate).
