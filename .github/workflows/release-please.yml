name: release-please

# CI-owned semantic versioning for @webeverything/contracts (#907, #2156).
#
# Flow: every push to main, release-please maintains a single "Release PR" that accumulates the pending
# version bump + CHANGELOG from Conventional Commit messages (fix: -> patch, feat: -> minor). Merging that
# Release PR is the release: release-please tags `contracts-v<version>`, cuts a GitHub Release, and the
# publish job below fires (gated on releases_created) to `npm publish`.
#
# 0.x lock (per owner, 2026-07-02): bump-minor-pre-major + bump-patch-for-minor-pre-major (in
# release-please-config.json) keep the package below 1.0.0 — a breaking change bumps the MINOR (0.x -> 0.(x+1))
# and a feature bumps the PATCH. Nothing ever auto-crosses to 1.0.0. Graduating to 1.0 is a deliberate
# config flip at go-public, never automatic.
#
# Note: release-please tags with the default GITHUB_TOKEN, which does NOT trigger the tag-triggered
# we:.github/workflows/publish-contracts.yml (GitHub suppresses workflow-triggered-by-GITHUB_TOKEN to avoid
# recursion) — so publishing is done inline here, not there. publish-contracts.yml stays as the manual
# (workflow_dispatch / hand-pushed tag) fallback.
#
# Publish resilience (#907, #xjcbsad): the publish job gates on `always() && releases_created == 'true'`,
# NOT the release-please job's success. Rationale — on the first 0.1.0 release (run 28606668569,
# 2026-07-02) release-please created the contracts-v0.1.0 tag + GitHub Release *successfully*, then threw on
# a cosmetic post-release step ("Unable to create comment because issue is locked"), which marked the job
# `failure`. Under a plain `needs:` gate that failure SKIPPED publish — so `npm publish` never ran and the
# registry stayed empty despite a real release existing. `always()` decouples the publish from that
# cosmetic error; `releases_created == 'true'` still fences it to runs where a release was actually cut, so
# a genuine pre-release failure (no release, empty output) correctly skips publish. The release-please job
# is left to fail loudly on real problems (we do NOT mask it with continue-on-error). Separately unlocking
# whatever conversation release-please tries to comment on removes the red-job noise, but is repo state, not
# a workflow lever — the guard is what guarantees the publish regardless.

on:
  push:
    branches: [main]

permissions:
  contents: write # release-please pushes the Release PR branch, the tag, and the GitHub Release
  pull-requests: write # release-please opens/updates the Release PR
  id-token: write # npm provenance (Sigstore OIDC)

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # `always()` so a cosmetic post-release failure in the release-please job (e.g. commenting on a locked
    # conversation) can't skip a publish once a release was actually cut — see the "Publish resilience" note
    # in the header. `releases_created == 'true'` still fences publish to real releases (empty output on a
    # genuine pre-release failure → skip). Single-package repo: releases_created is sufficient; when a second
    # package lands, gate on the per-path output `contracts--release_created` instead.
    if: always() && needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm ci
      - name: Repo health gate
        run: npm run check:standards
      - name: Publish
        working-directory: contracts
        # public + provenance (contracts/package.json publishConfig also pins these). prepublishOnly refuses 0.0.0.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
