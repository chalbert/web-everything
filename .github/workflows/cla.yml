name: CLA Assistant

# Gates every pull request on the Contributor License Agreement (./CLA.md).
# A PR cannot be merged until its author (and every co-author) has signed.
# Signatures are recorded in a JSON ledger committed to a dedicated branch, so the
# record survives independently of any single PR. See backlog #217.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    # Only run on the recheck phrase or on PR events — not on every comment.
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The CLA text contributors are agreeing to.
          path-to-document: 'https://github.com/OWNER/REPO/blob/main/CLA.md'
          # Where signatures are persisted (a branch, not main).
          branch: 'cla-signatures'
          path-to-signatures: 'signatures/cla.json'
          # Phrases the bot accepts as a signature / a manual re-run.
          custom-allsigned-prdcomment: 'All contributors have signed the CLA. Thank you!'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Thanks for your contribution. Before it can be merged, please sign our [Contributor License Agreement](https://github.com/OWNER/REPO/blob/main/CLA.md) by posting the comment below in this PR:'
          # Bots and the maintainer never need to sign.
          allowlist: 'dependabot[bot],renovate[bot]'
