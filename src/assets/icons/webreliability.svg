<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="reliabilityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="14" y="14" width="100" height="100" rx="30" fill="#ecfdf5" />

  <g filter="url(#floatShadow)">
      <!-- Retry arc: open circle representing recovery / re-attempt -->
      <path d="M88 50 A30 30 0 1 0 92 70" stroke="url(#reliabilityGrad)" stroke-width="9" stroke-linecap="round" fill="none" />
      <!-- Arrowhead closing the retry loop -->
      <path d="M76 40 L90 49 L82 64" stroke="url(#reliabilityGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <!-- Checkmark: successful recovery -->
      <path d="M53 64 L61 73 L78 53" stroke="#047857" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
