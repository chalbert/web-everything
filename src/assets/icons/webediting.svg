<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="editingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <filter id="editingShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="14" y="14" width="100" height="100" rx="30" fill="#eef2ff" />

  <g filter="url(#editingShadow)">
      <!-- Text lines being edited -->
      <path d="M40 50 H82" stroke="url(#editingGrad)" stroke-width="6" stroke-linecap="round" />
      <path d="M40 66 H72" stroke="url(#editingGrad)" stroke-width="6" stroke-linecap="round" />
      <!-- Pencil editing the surface -->
      <path d="M58 92 L86 64 L96 74 L68 102 L54 106 Z" fill="#fff" stroke="#4338ca" stroke-width="6" stroke-linejoin="round" />
      <path d="M82 68 L92 78" stroke="#4338ca" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
