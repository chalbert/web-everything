<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Indigo (States) -->
    <linearGradient id="gradIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: an append-only timeline — vertical spine with three time-ordered entries -->
  <g filter="url(#floatShadow)">
    <!-- the spine -->
    <rect x="42" y="36" width="7" height="56" rx="3.5" fill="url(#gradIndigo)" />
    <!-- three entry nodes down the spine (newest appended at the bottom) -->
    <circle cx="45.5" cy="42" r="9" fill="url(#gradIndigo)" />
    <circle cx="45.5" cy="64" r="9" fill="url(#gradIndigo)" />
    <circle cx="45.5" cy="86" r="9" fill="url(#gradIndigo)" />
    <!-- the immutable record lines beside each node -->
    <rect x="62" y="38" width="34" height="7" rx="3.5" fill="url(#gradIndigo)" />
    <rect x="62" y="60" width="28" height="7" rx="3.5" fill="url(#gradIndigo)" />
    <rect x="62" y="82" width="34" height="7" rx="3.5" fill="url(#gradIndigo)" />
  </g>
</svg>
