<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Indigo (States) -->
    <linearGradient id="gradIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: a design-token palette — a primitive scale (a ramp of swatches) feeding a derived value -->
  <g filter="url(#floatShadow)">
    <!-- the primitive scale: three steps of one ramp, indigo at varying tone -->
    <rect x="38" y="40" width="20" height="20" rx="6" fill="url(#gradIndigo)" opacity="0.45" />
    <rect x="38" y="64" width="20" height="20" rx="6" fill="url(#gradIndigo)" opacity="0.7" />
  </g>
  <!-- second column: the resolved semantic/component token (full-tone), connected by aliasing arrows -->
  <g filter="url(#floatShadow)">
    <rect x="74" y="52" width="24" height="24" rx="7" fill="url(#gradIndigo)" />
  </g>
  <!-- aliasing links: the swatches resolve INTO the token -->
  <g fill="none" stroke="url(#gradIndigo)" stroke-width="5" stroke-linecap="round">
    <path d="M 60 50 L 72 60" />
    <path d="M 60 74 L 72 68" />
  </g>
  <!-- a CSS custom-property mark on the resolved token: -- -->
  <g stroke="#f8fafc" stroke-width="3" stroke-linecap="round">
    <path d="M 82 64 L 86 64" />
    <path d="M 90 64 L 94 64" />
  </g>
</svg>
