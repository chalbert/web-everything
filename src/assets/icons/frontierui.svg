<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Teal for FrontierUI -->
    <linearGradient id="fuiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- FU letterforms -->
  <g filter="url(#floatShadow)">
    <!-- F -->
    <path d="M38 40 V88 M38 40 H60 M38 62 H56" stroke="url(#fuiGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- U -->
    <path d="M72 40 V78 C72 84 76 88 82 88 C88 88 92 84 92 78 V40" stroke="url(#fuiGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-opacity="0.8" />
  </g>
</svg>
