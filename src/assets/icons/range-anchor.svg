<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Amber (Anchoring) -->
    <linearGradient id="gradAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: lines of text with a durable highlighted range pinned by an anchor -->
  <g filter="url(#floatShadow)">
    <!-- text lines (the document) -->
    <rect x="34" y="40" width="60" height="6" rx="3" fill="#cbd5e1" />
    <rect x="34" y="76" width="44" height="6" rx="3" fill="#cbd5e1" />
    <!-- the anchored range (the quoted selection) -->
    <rect x="34" y="56" width="60" height="10" rx="5" fill="url(#gradAmber)" opacity="0.9" />
    <!-- the anchor pin marking the durable point -->
    <circle cx="90" cy="61" r="8" fill="none" stroke="url(#gradAmber)" stroke-width="5" />
    <line x1="90" y1="69" x2="90" y2="92" stroke="url(#gradAmber)" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>
