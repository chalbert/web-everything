<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Indigo (States) -->
    <linearGradient id="gradIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: a notification bell — server→client delivery surfacing as a notification -->
  <g filter="url(#floatShadow)">
    <!-- the bell body -->
    <path d="M 64 34 C 50 34 42 44 42 60 L 42 74 L 36 84 L 92 84 L 86 74 L 86 60 C 86 44 78 34 64 34 Z" fill="url(#gradIndigo)" />
    <!-- the clapper -->
    <path d="M 56 90 C 56 96 60 100 64 100 C 68 100 72 96 72 90 Z" fill="url(#gradIndigo)" />
  </g>
  <!-- the unread/push marker — the server-delivered signal -->
  <circle cx="86" cy="40" r="11" fill="#4f46e5" filter="url(#floatShadow)" />
  <circle cx="86" cy="40" r="5" fill="#f8fafc" />
</svg>
