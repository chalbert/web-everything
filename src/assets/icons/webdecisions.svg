<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Indigo (States) -->
    <linearGradient id="gradIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: a decision — branch node splitting to a checked outcome and a crossed one -->
  <g filter="url(#floatShadow)" fill="none" stroke="url(#gradIndigo)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- the branch: from a root node out to two outcomes -->
    <path d="M 44 40 L 44 64 L 84 40" />
    <path d="M 44 64 L 84 88" />
  </g>
  <g filter="url(#floatShadow)">
    <circle cx="44" cy="36" r="8" fill="url(#gradIndigo)" />
    <!-- pass outcome (top) -->
    <circle cx="88" cy="38" r="11" fill="url(#gradIndigo)" />
    <!-- fail outcome (bottom) -->
    <circle cx="88" cy="90" r="11" fill="url(#gradIndigo)" />
  </g>
  <!-- check + cross glyphs in white on the outcome nodes -->
  <g fill="none" stroke="#f8fafc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 83 38 L 87 42 L 93 34" />
    <path d="M 84 86 L 92 94 M 92 86 L 84 94" />
  </g>
</svg>
