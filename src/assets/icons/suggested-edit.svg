<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Emerald (accept) -->
    <linearGradient id="gradEmerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Rose (delete / reject) -->
    <linearGradient id="gradRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: text lines with a suggested insertion (green) and deletion (red strikethrough) -->
  <g filter="url(#floatShadow)">
    <!-- text line above (context) -->
    <rect x="28" y="36" width="72" height="6" rx="3" fill="#cbd5e1" />

    <!-- proposed DELETION range — red highlight with strikethrough -->
    <rect x="28" y="52" width="42" height="10" rx="3" fill="url(#gradRose)" opacity="0.25" />
    <line x1="28" y1="57" x2="70" y2="57" stroke="url(#gradRose)" stroke-width="2.5" stroke-linecap="round" />

    <!-- proposed INSERTION range — green underline -->
    <rect x="28" y="68" width="54" height="10" rx="3" fill="url(#gradEmerald)" opacity="0.25" />
    <line x1="28" y1="80" x2="82" y2="80" stroke="url(#gradEmerald)" stroke-width="2.5" stroke-linecap="round" />

    <!-- text line below (context) -->
    <rect x="28" y="88" width="56" height="6" rx="3" fill="#cbd5e1" />

    <!-- accept checkmark (top-right) -->
    <circle cx="98" cy="38" r="11" fill="url(#gradEmerald)" />
    <polyline points="93,38 97,43 104,33" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
