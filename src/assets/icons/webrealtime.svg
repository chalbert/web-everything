<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Cyan (live transport) -->
    <linearGradient id="gradCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: a live signal radiating from a source — the open-app server→client stream -->
  <g filter="url(#floatShadow)">
    <!-- the source node (server) -->
    <circle cx="48" cy="64" r="10" fill="url(#gradCyan)" />
    <!-- radiating connection arcs (the negotiated transport) -->
    <path d="M 64 48 A 22 22 0 0 1 64 80" fill="none" stroke="url(#gradCyan)" stroke-width="7" stroke-linecap="round" />
    <path d="M 76 40 A 36 36 0 0 1 76 88" fill="none" stroke="url(#gradCyan)" stroke-width="7" stroke-linecap="round" opacity="0.66" />
    <path d="M 88 32 A 50 50 0 0 1 88 96" fill="none" stroke="url(#gradCyan)" stroke-width="7" stroke-linecap="round" opacity="0.38" />
  </g>
</svg>
