<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- GLOBAL FILTER: Do Not Modify -->
    <filter id="floatShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Teal (Isolation) -->
    <linearGradient id="gradTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
  </defs>

  <!-- BASE: Rounded Container (Slate-50) -->
  <rect x="14" y="14" width="100" height="100" rx="30" fill="#f8fafc" />

  <!-- CONTENT: a light-DOM subtree walled off in+out — a dashed isolation boundary around a solid component -->
  <g filter="url(#floatShadow)">
    <!-- the isolation boundary (scope) — dashed to read as "permeable to nothing" -->
    <rect x="36" y="36" width="56" height="56" rx="14" fill="none"
          stroke="url(#gradTeal)" stroke-width="5" stroke-dasharray="9 7" />
    <!-- the isolated component inside (self-styling, source-blind) -->
    <rect x="50" y="50" width="28" height="28" rx="8" fill="url(#gradTeal)" />
    <!-- cascade blocked at the wall: stubs that stop at the boundary (out-leak top, in-leak bottom) -->
    <rect x="60" y="22" width="8" height="12" rx="4" fill="url(#gradTeal)" opacity="0.55" />
    <rect x="60" y="94" width="8" height="12" rx="4" fill="url(#gradTeal)" opacity="0.55" />
  </g>
</svg>
