<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="validationGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
    <filter id="validationShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="14" y="14" width="100" height="100" rx="30" fill="#eef2ff" />

  <g filter="url(#validationShadow)">
      <!-- Form field outline -->
      <rect x="34" y="46" width="60" height="20" rx="6" stroke="url(#validationGrad)" stroke-width="6" fill="none" />
      <!-- Checkmark inside the field, signalling validity -->
      <path d="M46 78 L58 90 L86 60" stroke="#4338ca" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
